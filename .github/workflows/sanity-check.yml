name: PR Sanity Check

on:
  pull_request:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  lint:
    runs-on: ubuntu-20.04
  permissions:
    contents: write
    pull-requests: write
    repository-projects: write
  steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install
      run: |
        npm install

    - name: Lint
      run: |
        npm run lint

    - name: Test
      run: |
        npm run test
